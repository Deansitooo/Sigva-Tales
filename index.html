<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Grimorio Viviente - Sección Grimorio</title>
<style>
body {
    margin:0;
    padding:0;
    font-family: 'Georgia', serif;
    background:#111;
    color:#f5e6c4;
    overflow-x:hidden;
    position:relative;
}

#FondoGIF {
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background: url('https://wallpapercave.com/wp/wp1998740.jpg') no-repeat center center fixed;
    background-size:cover;
    z-index:-1;
}

.container {
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px;
    box-sizing:border-box;
}

.page {
    background: rgba(20,10,0,0.85);
    border:4px solid #6b4f2a;
    border-radius:15px;
    padding:50px;
    width:90%;
    max-width:1200px;
    min-height:80vh;
    margin:20px 0;
    box-shadow: 0 0 70px rgba(0,0,0,0.8);
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
}

.nav-buttons {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:30px;
}

.icon-button {
    display:flex;
    align-items:center;
    background: rgba(107,79,42,0.9);
    padding:10px 20px;
    border-radius:10px;
    text-decoration:none;
    color:#f5e6c4;
    font-weight:bold;
    font-size:1.1rem;
    transition: all 0.2s ease;
}

.icon-button img {
    width:40px;
    height:40px;
    margin-right:10px;
}

.icon-button:hover {
    background: rgba(138,103,59,0.95);
}

h1 { text-align:center; font-size:3rem; margin-bottom:20px; }
p { font-size:1.2rem; text-align:center; line-height:1.6; }
img.content-img { border-radius:15px; display:block; margin:auto; max-width:40%; height:auto; }

@media (max-width: 768px) {
    .page { padding:20px; min-height:auto; width:95%; }
    h1 { font-size:2rem; margin-bottom:15px; }
    p { font-size:1rem; line-height:1.4; text-align:left; }
    img.content-img { max-width:80%; margin-bottom:15px; }
    .icon-button { font-size:0.95rem; padding:8px 15px; }
    .icon-button img { width:30px; height:30px; margin-right:5px; }
    .nav-buttons { flex-direction:column; align-items:center; gap:10px; }
}
</style>
</head>
<body>

<div id="FondoGIF"></div>

<div class="container">
<div class="page" id="Grimorio">
    <h1>ℕ𝔼ℂℝ𝕆𝕄𝔸ℕℂ𝕀𝔸</h1>
    <p>
        Bajo los suburbios de una antigua ciudad decadente, cuyo nombre jamás sería revelado, habitó un médico de renombre...
    </p>
    <img src="img/book-darkhold.gif" class="content-img">

    <div class="nav-buttons">
        <a href="historia.html" class="icon-button">
            <img src="img/book2.gif" alt="Historia">
            <span>Historia</span>
        </a>
        <a href="crisis.html" class="icon-button">
            <img src="img/Creep2.gif" alt="Crisis">
            <span>Crisis</span>
        </a>
        <a href="genetica.html" class="icon-button">
            <img src="img/alien_incubator.png" alt="Genética">
            <span>Genética</span>
        </a>
        <a href="registros.html" class="icon-button">
            <img src="img/paper-with-sidebar-plain.png" alt="Registros">
            <span>Registros</span>
        </a>
    </div>
</div>
</div>

</body>
</html>
